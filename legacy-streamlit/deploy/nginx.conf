# PsySense — Nginx Reverse Proxy
# Handles: HTTPS termination, WebSocket upgrade (Streamlit + WebRTC), static caching
#
# For AWS ALB: you don't need this file — ALB handles SSL.
# For direct EC2: use certbot to generate SSL certs, then this config.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Streamlit UI — main app
    location / {
        proxy_pass http://psysense:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Streamlit + WebRTC)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Streamlit WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://psysense:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Microservice APIs (if exposed externally)
    location /api/answer/ {
        proxy_pass http://psysense:8000/;
    }
    location /api/fusion/ {
        proxy_pass http://psysense:8001/;
    }
    location /api/emotion/ {
        proxy_pass http://psysense:8002/;
    }
    location /api/insight/ {
        proxy_pass http://psysense:8003/;
    }
    location /api/engagement/ {
        proxy_pass http://psysense:8004/;
    }

    # File upload size (resumes, etc.)
    client_max_body_size 50M;
}
