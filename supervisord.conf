[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/app/logs/supervisord.pid

[program:answer_service]
command=python -m uvicorn answer_service.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
startretries=5
stderr_logfile=/app/logs/answer_service.err.log
stdout_logfile=/app/logs/answer_service.out.log

