version = 0.1

[default.deploy.parameters]
stack_name = "psysense-dev"
resolve_s3 = true
s3_prefix = "psysense-dev"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
parameter_overrides = "StageName=dev FrontendUrl=http://localhost:5173"

[default.build.parameters]
cached = true
parallel = true
