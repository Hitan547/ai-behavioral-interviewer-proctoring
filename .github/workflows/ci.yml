name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  serverless-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r serverless/backend/requirements.txt

    - name: Verify serverless Python files compile
      run: |
        python -m compileall -q serverless/backend serverless/local_server.py

    - name: Run serverless tests
      env:
        ENVIRONMENT: "test"
      run: |
        python -m pytest tests/test_serverless_*.py -v --tb=short

  serverless-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: serverless/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: serverless/frontend
      run: npm ci

    - name: Build frontend
      working-directory: serverless/frontend
      run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: pip install ruff

    - name: Run linter
      run: ruff check --select=E,F,I --ignore=E501,E402,F401 serverless/backend serverless/local_server.py tests
